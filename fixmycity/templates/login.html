<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CityProblem | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root { --brand: #1a56ff; --bg: #f4f6fb; --surface: #fff; --border: #e4e8f0; --text: #111827; --text-muted: #6b7280; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; overflow-x: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: stretch; }

    .left-panel {
      flex: 1; background: linear-gradient(135deg, #1a56ff 0%, #0d3acc 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      padding: 60px; color: #fff;
    }
    .left-panel h2 { font-family: 'Syne', sans-serif; font-size: 42px; font-weight: 800; margin-bottom: 16px; }
    .left-panel p { font-size: 18px; opacity: 0.85; max-width: 380px; text-align: center; line-height: 1.6; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 48px; width: 100%; max-width: 380px; }
    .mini-stat { background: rgba(255,255,255,0.12); border-radius: 14px; padding: 20px; backdrop-filter: blur(8px); }
    .mini-stat .val { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
    .mini-stat .lbl { font-size: 13px; opacity: 0.75; margin-top: 2px; }

    .right-panel {
      width: 460px; max-width: 100%; background: var(--surface); display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 60px 50px;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: var(--brand); margin-bottom: 10px; }
    .logo span { color: var(--text); }
    .right-panel h3 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .right-panel .sub { font-size: 14px; color: var(--text-muted); margin-bottom: 36px; }

    .google-btn {
      width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--surface); display: flex; align-items: center; justify-content: center; gap: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
      text-decoration: none; color: var(--text); transition: all 0.2s; margin-bottom: 16px;
    }
    .google-btn:hover { border-color: var(--brand); background: #f0f5ff; }
    .google-btn img { width: 20px; height: 20px; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 8px 0 16px; width: 100%; color: var(--text-muted); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .demo-btn {
      width: 100%; padding: 14px; border-radius: 12px; background: var(--brand); color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
      text-decoration: none; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s;
    }
    .demo-btn:hover { opacity: 0.88; }

    .note { margin-top: 24px; font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.6; }
    .note a { color: var(--brand); text-decoration: none; }

    @media (max-width: 1000px) {
      .left-panel { display: none; }
      .right-panel { width: 100%; padding: 48px 28px; }
    }

    @media (max-width: 600px) {
      body { display: block; }
      .right-panel { padding: 34px 18px; }
      .logo { font-size: 24px; }
      .right-panel h3 { font-size: 22px; }
      .google-btn, .demo-btn { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="left-panel">
    <h2>CityProblem</h2>
    <p>Department Dashboard for smarter city issue management and resolution tracking.</p>
    <div class="stats-grid">
      <div class="mini-stat"><div class="val">1,247</div><div class="lbl">Total Issues</div></div>
      <div class="mini-stat"><div class="val">984</div><div class="lbl">Resolved</div></div>
      <div class="mini-stat"><div class="val">3.2d</div><div class="lbl">Avg. Resolution</div></div>
      <div class="mini-stat"><div class="val">79%</div><div class="lbl">Resolution Rate</div></div>
    </div>
  </div>

  <div class="right-panel">
    <div class="logo">City<span>Problem</span></div>
    <h3>Welcome back</h3>
    <p class="sub">Sign in to your department account</p>

    <a href="/login/google" class="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </a>

    <div class="divider">or</div>

    <a href="/login/demo" class="demo-btn">🏛️ Enter as Demo User</a>

    
  </div>
</body>
</html>
